<script>
    const cartesJeux = Array.from(document.querySelectorAll('.jeu'));
    const boutonsCategories = document.querySelectorAll('.categorie');
    const recherche = document.getElementById('recherche');
    const compteurJeux = document.getElementById('compteur-jeux');
    const boutonAleatoire = document.getElementById('jeu-aleatoire');
    let categorieActive = 'tous';

    function normaliser(texte) {
        return texte
            .toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '');
    }

    function filtrerJeux() {
        const rechercheActive = normaliser(recherche.value.trim());
        let nombreVisible = 0;

        cartesJeux.forEach((carte) => {
            const categories = carte.dataset.categories.split(' ');
            const nom = normaliser(`${carte.dataset.nom || ''} ${carte.textContent}`);
            const bonneCategorie = categorieActive === 'tous' || categories.includes(categorieActive);
            const bonneRecherche = nom.includes(rechercheActive);
            const estVisible = bonneCategorie && bonneRecherche;

            carte.classList.toggle('masque', !estVisible);
            if (estVisible) nombreVisible++;
        });

        compteurJeux.textContent = `${nombreVisible} jeu${nombreVisible === 1 ? '' : 'x'}`;
    }

    boutonsCategories.forEach((bouton) => {
        bouton.addEventListener('click', () => {
            categorieActive = bouton.dataset.categorie;
            boutonsCategories.forEach((autreBouton) => autreBouton.classList.remove('active'));
            bouton.classList.add('active');
            filtrerJeux();
        });
    });

    recherche.addEventListener('input', filtrerJeux);

    boutonAleatoire.addEventListener('click', () => {
        const jeuxVisibles = cartesJeux.filter((carte) => !carte.classList.contains('masque'));

        if (jeuxVisibles.length === 0) return;

        const jeuChoisi = jeuxVisibles[Math.floor(Math.random() * jeuxVisibles.length)];
        const lien = jeuChoisi.querySelector('a');
        if (lien) window.location.href = lien.href;
    });

    filtrerJeux();
</script>
