<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Code Secret</title>

<link rel="icon" type="image/png" href="web/console-de-jeu.png">

<style>
body{
    text-align:center;
    font-family:Arial;
    margin-top:50px;
}
body {
    background-image: url("../fond.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

input,button{
    font-size:20px;
    padding:10px;
}
h1{
        font-size:60px;
        text-shadow:0 0 15px cyan;
    }
#message{
    font-size:24px;
    margin-top:20px;
}
</style>

</head>
<body>

<h1>🔐 Code Secret</h1>

<p>Trouve le code à 4 chiffres !</p>

<input id="proposition" maxlength="4">

<button onclick="verifier()">Valider</button>

<p id="message"></p>

<script>

let code = "";

for(let i=0;i<4;i++){
    code += Math.floor(Math.random()*10);
}

function verifier(){

    let proposition =
        document.getElementById("proposition").value;

    let message =
        document.getElementById("message");

    if(proposition.length != 4 || isNaN(proposition)){
        message.textContent =
        "❌ Tu dois entrer exactement 4 chiffres";
        return;
    }

    let bien_places = 0;
    let mal_places = 0;

    for(let i=0;i<4;i++){

        if(proposition[i] == code[i]){
            bien_places++;
        }

        else if(code.includes(proposition[i])){
            mal_places++;
        }
    }

    if(bien_places == 4){

        message.innerHTML =
        "🎉 Bravo ! Le code était : " + code;

    }else{

        message.innerHTML =
        "✅ Bien placés : " + bien_places +
        "<br>🟡 Mal placés : " + mal_places;
    }
}

</script>

</body>
</html>
