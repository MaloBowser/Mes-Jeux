<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Nuits de Valombre</title>
<link rel="icon" type="image/png" href="console-de-jeu.png">
<style>
:root{
  --cyan:#35e7ff;
  --blue:#06172f;
  --panel:rgba(3,10,25,.88);
  --gold:#ffd86b;
  --danger:#ff5b6e;
  --ok:#55ef9f;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:
    linear-gradient(rgba(0,0,15,.55),rgba(0,0,20,.78)),
    url("../fond.jpg") center/cover fixed;
  color:white;
  font-family:Arial,Helvetica,sans-serif;
  text-align:center;
}
main{width:min(960px,94%);margin:0 auto;padding:28px 0 60px}
h1{
  margin:10px 0 5px;
  font-size:clamp(40px,7vw,72px);
  text-shadow:0 0 12px var(--cyan),0 0 35px #315bff;
}
.subtitle{font-size:20px;opacity:.9}
.panel{
  margin:25px auto;
  padding:28px;
  border:2px solid var(--cyan);
  border-radius:24px;
  background:var(--panel);
  box-shadow:0 0 28px rgba(53,231,255,.45);
}
.hidden{display:none!important}
button,input,select{
  font:inherit;
}
button{
  margin:8px;
  padding:12px 22px;
  border:2px solid var(--cyan);
  border-radius:14px;
  background:#05080f;
  color:white;
  cursor:pointer;
  transition:.2s;
}
button:hover:not(:disabled){transform:scale(1.04);box-shadow:0 0 18px var(--cyan)}
button:disabled{opacity:.45;cursor:not-allowed}
button.danger{border-color:var(--danger)}
button.ok{border-color:var(--ok)}
input,select{
  width:min(420px,92%);
  padding:12px;
  margin:7px;
  background:#05080f;
  color:white;
  border:2px solid var(--cyan);
  border-radius:12px;
  text-align:center;
}
.player-row{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap}
.card{
  width:min(560px,100%);
  margin:20px auto;
  padding:25px;
  border-radius:24px;
  background:linear-gradient(145deg,#101c38,#030712);
  border:2px solid var(--gold);
  box-shadow:0 0 25px rgba(255,216,107,.35);
}
.role-icon{font-size:72px}
.role-title{font-size:34px;color:var(--gold);font-weight:bold}
.role-desc{font-size:20px;line-height:1.5}
.list{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
  margin-top:18px;
}
.choice{width:100%}
.log{
  text-align:left;
  white-space:pre-wrap;
  line-height:1.55;
  background:#02050c;
  border-radius:14px;
  padding:18px;
  max-height:330px;
  overflow:auto;
}
.status{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin:16px 0;
}
.badge{
  padding:8px 12px;
  border-radius:999px;
  background:#071326;
  border:1px solid rgba(255,255,255,.25);
}
.dead{opacity:.45;text-decoration:line-through}
.big{font-size:30px}
.warning{color:var(--gold)}
.error{color:#ff8c9a}
.success{color:#72f0ac}
hr{border:0;border-top:1px solid rgba(255,255,255,.2);margin:22px 0}
@media(max-width:600px){
  .panel{padding:18px}
  button{width:92%}
}
</style>
</head>
<body>
<main>
  <h1>🌕 Les Nuits de Valombre</h1>
  <p class="subtitle">Loup-Garou — édition immersive, de 5 à 18 joueurs</p>

  <section id="setup" class="panel">
    <h2>Créer la partie</h2>
    <p>Entre le nombre de joueurs, puis leurs prénoms.</p>
    <input id="playerCount" type="number" min="5" max="18" value="5">
    <br>
    <button onclick="buildNameFields()">Créer les joueurs</button>
    <div id="nameFields"></div>
    <button id="startBtn" class="ok hidden" onclick="startGame()">Commencer la partie</button>
  </section>

  <section id="game" class="panel hidden">
    <div id="status"></div>
    <div id="content"></div>
  </section>
</main>

<script>
const ROLES = {
  WOLF:{name:"Loup-Garou",icon:"🐺",camp:"meute",description:"Chaque nuit, la Meute choisit une victime. Le jour, mens et détourne les soupçons."},
  SEER:{name:"Voyante",icon:"🔮",camp:"village",description:"Chaque nuit, découvre le rôle exact d'un joueur vivant."},
  WITCH:{name:"Sorcière",icon:"🧪",camp:"village",description:"Possède une potion de vie et une potion de mort, utilisables une seule fois chacune."},
  HUNTER:{name:"Chasseur",icon:"🏹",camp:"village",description:"À ta mort, emporte immédiatement un autre joueur dans ta chute."},
  CUPID:{name:"Cupidon",icon:"💘",camp:"village",description:"La première nuit, lie deux joueurs : si l'un meurt, l'autre meurt de chagrin."},
  PROTECTOR:{name:"Salvateur",icon:"🛡️",camp:"village",description:"Protège une personne chaque nuit, mais jamais la même deux nuits de suite."},
  VILLAGER:{name:"Simple Villageois",icon:"🕯️",camp:"village",description:"Aucun pouvoir nocturne : observe, débat et vote avec discernement."}
};

let G = {};

function byId(id){return document.getElementById(id)}
function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [b[i],b[j]]=[b[j],b[i]];
  }
  return b;
}
function living(){return G.players.filter(p=>p.alive)}
function withRole(key){return living().filter(p=>p.roleKey===key)}
function playerById(id){return G.players.find(p=>p.id===Number(id))}
function roleTitle(p){const r=ROLES[p.roleKey];return `${r.icon} ${r.name}`}
function setContent(html){byId("content").innerHTML=html;renderStatus()}
function renderStatus(){
  if(!G.players)return;
  const alive=living().map(p=>`<span class="badge">👤 ${p.name}</span>`).join("");
  byId("status").innerHTML=`<div class="status"><span class="badge">🌙 Tour ${G.round}</span><span class="badge">❤️ ${living().length} vivant(s)</span></div><div class="status">${alive}</div>`;
}
function options(players, allowNone=false){
  return `${allowNone?'<option value="0">Personne</option>':''}`+
    players.map(p=>`<option value="${p.id}">${p.name}</option>`).join("");
}
function buttonList(players, fnName){
  return `<div class="list">${players.map(p=>`<button class="choice" onclick="${fnName}(${p.id})">${p.name}</button>`).join("")}</div>`;
}
function buildNameFields(){
  const n=Number(byId("playerCount").value);
  if(n<5||n>18){alert("Choisis entre 5 et 18 joueurs.");return;}
  byId("nameFields").innerHTML="<h3>Prénoms</h3>"+
    Array.from({length:n},(_,i)=>`<input id="name${i}" placeholder="Joueur ${i+1}">`).join("<br>");
  byId("startBtn").classList.remove("hidden");
}
function makeRoles(count){
  const wolves=count<=6?1:count<=11?2:count<=15?3:4;
  let roles=Array(wolves).fill("WOLF").concat(["SEER","WITCH","HUNTER"]);
  if(count>=8)roles.push("CUPID");
  if(count>=9)roles.push("PROTECTOR");
  while(roles.length<count)roles.push("VILLAGER");
  return shuffle(roles);
}
function startGame(){
  const n=Number(byId("playerCount").value);
  const names=[];
  for(let i=0;i<n;i++){
    const name=byId("name"+i).value.trim();
    if(!name){alert("Tous les prénoms doivent être remplis.");return;}
    if(names.some(x=>x.toLowerCase()===name.toLowerCase())){alert("Deux joueurs ne peuvent pas avoir le même prénom.");return;}
    names.push(name.slice(0,24));
  }
  const roles=makeRoles(n);
  G={
    players:names.map((name,i)=>({id:i,name,roleKey:roles[i],alive:true,loverId:null})),
    round:0,revealIndex:0,witchHeal:true,witchPoison:true,lastProtectedId:null,
    cupidActed:false,phase:"reveal",wolfTargetId:null,protectedId:null,
    savedId:null,poisonedId:null,nightLog:[],voteRound:1,votes:{},voterIndex:0,
    voteCandidates:null
  };
  byId("setup").classList.add("hidden");
  byId("game").classList.remove("hidden");
  showRevealIntro();
}
function showRevealIntro(){
  setContent(`<h2>📜 Le registre scellé</h2><p>Les rôles vont être révélés un par un. Ne laisse personne regarder par-dessus ton épaule.</p><button onclick="showNextReveal()">Commencer la révélation</button>`);
}
function showNextReveal(){
  if(G.revealIndex>=G.players.length){startNight();return;}
  const p=G.players[G.revealIndex];
  setContent(`<h2>🔒 Écran confidentiel</h2><p>Passe l'écran à <b>${p.name}</b>. Les autres détournent le regard.</p><button onclick="revealRole()">Je suis ${p.name}, voir mon rôle</button>`);
}
function revealRole(){
  const p=G.players[G.revealIndex],r=ROLES[p.roleKey];
  let extra="";
  if(p.roleKey==="WOLF"){
    const others=G.players.filter(x=>x.roleKey==="WOLF"&&x.id!==p.id).map(x=>x.name);
    extra=`<p>Autres membres de la Meute : <b>${others.length?others.join(", "):"tu chasses seul(e)"}</b></p>`;
  }
  setContent(`<div class="card"><div class="role-icon">${r.icon}</div><div class="role-title">${r.name}</div><p class="role-desc">${r.description}</p>${extra}</div><button onclick="hideRole()">Cacher mon rôle</button>`);
}
function hideRole(){G.revealIndex++;showNextReveal();}

function startNight(){
  const win=winner(); if(win){showEpilogue(win);return;}
  G.round++;G.nightLog=[];G.wolfTargetId=null;G.protectedId=null;G.savedId=null;G.poisonedId=null;
  const texts=[
    "La brume descend sur Valombre. Les portes se verrouillent et, au loin, une branche craque.",
    "La lune disparaît derrière des nuages lourds. Quelque chose rôde entre les maisons.",
    "Le dernier feu s'éteint. Dans les ruelles, un souffle animal trouble le silence."
  ];
  setContent(`<h2>☾ Nuit ${G.round}</h2><p class="big">${texts[Math.floor(Math.random()*texts.length)]}</p><button onclick="nightCupid()">Tout le monde ferme les yeux</button>`);
}
function handover(p,title,callbackName){
  setContent(`<h2>◈ Écran confidentiel</h2><p>Passe l'écran à <b>${p.name}</b>. Les autres détournent le regard.</p><button onclick="${callbackName}()">${p.name}, continuer — ${title}</button>`);
}
function nightCupid(){
  const cupids=withRole("CUPID");
  if(G.round===1&&cupids.length&&!G.cupidActed){handover(cupids[0],"unir deux destins","cupidChoose1");}
  else nightProtector();
}
function cupidChoose1(){
  const cupid=withRole("CUPID")[0];
  setContent(`<h2>💘 Cupidon se réveille</h2><p>Choisis le premier amoureux.</p><select id="cupid1">${options(living())}</select><br><button onclick="cupidChoose2()">Valider</button>`);
}
function cupidChoose2(){
  G.cupidFirst=Number(byId("cupid1").value);
  const candidates=living().filter(p=>p.id!==G.cupidFirst);
  setContent(`<h2>💘 Cupidon se réveille</h2><p>Choisis le second amoureux.</p><select id="cupid2">${options(candidates)}</select><br><button onclick="saveCupid()">Lier les destins</button>`);
}
function saveCupid(){
  const a=playerById(G.cupidFirst),b=playerById(Number(byId("cupid2").value));
  a.loverId=b.id;b.loverId=a.id;G.cupidActed=true;G.loverReveal=[a.id,b.id];G.loverRevealIndex=0;
  showLoverReveal();
}
function showLoverReveal(){
  if(G.loverRevealIndex>=2){nightProtector();return;}
  const p=playerById(G.loverReveal[G.loverRevealIndex]);
  setContent(`<h2>♥ Un lien indestructible</h2><p>Passe l'écran à <b>${p.name}</b>.</p><button onclick="showLoverIdentity()">Voir mon amour secret</button>`);
}
function showLoverIdentity(){
  const p=playerById(G.loverReveal[G.loverRevealIndex]),lover=playerById(p.loverId);
  const opposed=ROLES[p.roleKey].camp!==ROLES[lover.roleKey].camp;
  setContent(`<div class="card"><div class="role-icon">♥</div><div class="role-title">${lover.name}</div><p>Si l'un de vous meurt, l'autre mourra de chagrin.</p>${opposed?'<p class="warning">Vos camps sont opposés : votre but secret est de survivre ensemble.</p>':''}</div><button onclick="nextLoverReveal()">Cacher</button>`);
}
function nextLoverReveal(){G.loverRevealIndex++;showLoverReveal();}
function nightProtector(){
  const ps=withRole("PROTECTOR");
  if(!ps.length){nightSeer();return;}
  handover(ps[0],"protéger une âme","protectorChoose");
}
function protectorChoose(){
  const candidates=living().filter(p=>p.id!==G.lastProtectedId);
  setContent(`<h2>🛡️ Le Salvateur veille</h2><p>Qui places-tu sous ta protection ?</p><select id="protectTarget">${options(candidates)}</select><br><button onclick="saveProtection()">Protéger</button>`);
}
function saveProtection(){
  G.protectedId=Number(byId("protectTarget").value);
  G.lastProtectedId=G.protectedId;
  nightSeer();
}
function nightSeer(){
  const ss=withRole("SEER");
  if(!ss.length){nightWolves();return;}
  handover(ss[0],"sonder une identité","seerChoose");
}
function seerChoose(){
  const seer=withRole("SEER")[0],candidates=living().filter(p=>p.id!==seer.id);
  setContent(`<h2>🔮 La Voyante ouvre les yeux</h2><p>Quelle âme veux-tu sonder ?</p><select id="seerTarget">${options(candidates)}</select><br><button onclick="seerReveal()">Sonder</button>`);
}
function seerReveal(){
  const p=playerById(Number(byId("seerTarget").value));
  setContent(`<div class="card"><div class="role-icon">${ROLES[p.roleKey].icon}</div><div class="role-title">${p.name}</div><p>${p.name} est <b>${ROLES[p.roleKey].name}</b>.</p></div><button onclick="nightWolves()">Cacher la vision</button>`);
}
function nightWolves(){
  const wolves=withRole("WOLF");
  if(!wolves.length){nightWitch();return;}
  setContent(`<h2>🐺 La Meute se réveille</h2><p>Seuls les Loups-Garous ouvrent les yeux.</p><p>Meute vivante : <b>${wolves.map(p=>p.name).join(", ")}</b></p><button onclick="wolfChoose()">Choisir la victime</button>`);
}
function wolfChoose(){
  const candidates=living().filter(p=>p.roleKey!=="WOLF");
  setContent(`<h2>🐺 La Meute choisit</h2><select id="wolfTarget">${options(candidates)}</select><br><button onclick="saveWolfTarget()">Valider</button>`);
}
function saveWolfTarget(){G.wolfTargetId=Number(byId("wolfTarget").value);nightWitch();}
function nightWitch(){
  const ws=withRole("WITCH");
  if(!ws.length||(!G.witchHeal&&!G.witchPoison)){resolveNight();return;}
  handover(ws[0],"consulter tes potions","witchPanel");
}
function witchPanel(){
  const target=G.wolfTargetId!==null?playerById(G.wolfTargetId):null;
  setContent(`<h2>🧪 La Sorcière se réveille</h2><p>${target?`La Meute a désigné <b>${target.name}</b>.`:"Aucune victime."}</p>
  <p>Potion de vie : <b>${G.witchHeal?"disponible":"utilisée"}</b></p>
  <p>Potion de mort : <b>${G.witchPoison?"disponible":"utilisée"}</b></p>
  ${G.witchHeal&&target?'<button class="ok" onclick="witchHeal()">Utiliser la potion de vie</button>':''}
  <button onclick="witchSkipHeal()">Ne pas soigner</button>`);
}
function witchHeal(){G.savedId=G.wolfTargetId;G.witchHeal=false;witchPoisonStep();}
function witchSkipHeal(){witchPoisonStep();}
function witchPoisonStep(){
  if(!G.witchPoison){resolveNight();return;}
  const candidates=living().filter(p=>p.id!==G.savedId);
  setContent(`<h2>🧪 Potion de mort</h2><p>Souhaites-tu empoisonner quelqu'un ?</p><select id="poisonTarget">${options(candidates,true)}</select><br><button onclick="savePoison()">Valider</button>`);
}
function savePoison(){
  const id=Number(byId("poisonTarget").value);
  if(id!==0){G.poisonedId=id;G.witchPoison=false;}
  resolveNight();
}
function resolveNight(){
  const deaths=[];
  if(G.wolfTargetId!==null){
    if(G.wolfTargetId===G.protectedId)G.nightLog.push("Le Salvateur a repoussé une attaque.");
    else if(G.wolfTargetId===G.savedId)G.nightLog.push("La potion de vie a sauvé la victime.");
    else deaths.push({id:G.wolfTargetId,cause:"dévoré(e) par la Meute"});
  }
  if(G.poisonedId!==null&&!deaths.some(d=>d.id===G.poisonedId))deaths.push({id:G.poisonedId,cause:"empoisonné(e) par la Sorcière"});
  G.pendingDeaths=deaths;G.deathLog=[];
  processDeathQueue(()=>showDawn());
}
function processDeathQueue(done){
  if(!G.pendingDeaths.length){done();return;}
  const d=G.pendingDeaths.shift(),p=playerById(d.id);
  if(!p||!p.alive){processDeathQueue(done);return;}
  p.alive=false;
  G.deathLog.push(`💀 ${p.name} est mort(e), ${d.cause}. Rôle : ${roleTitle(p)}.`);
  if(p.loverId!==null){
    const lover=playerById(p.loverId);
    if(lover&&lover.alive)G.pendingDeaths.push({id:lover.id,cause:`brisé(e) par la mort de ${p.name}`});
  }
  if(p.roleKey==="HUNTER"&&living().length){
    G.hunterDeadId=p.id;G.afterHunter=done;
    setContent(`<h2>🏹 Le Chasseur tire une dernière fois</h2><p>${p.name}, choisis une personne à emporter avec toi.</p>${buttonList(living(),"hunterShoot")}`);
    return;
  }
  processDeathQueue(done);
}
function hunterShoot(id){
  const hunter=playerById(G.hunterDeadId),done=G.afterHunter;
  G.pendingDeaths.push({id,cause:`abattu(e) par le Chasseur ${hunter.name}`});
  G.hunterDeadId=null;G.afterHunter=null;
  processDeathQueue(done);
}
function showDawn(){
  const txt=G.deathLog.length?G.deathLog.join("\n"):"🌅 Personne n'est mort cette nuit.";
  setContent(`<h2>☀️ Aube du jour ${G.round}</h2><div class="log">${txt}${G.nightLog.length?"\n\n• "+G.nightLog.join("\n• "):""}</div><button onclick="afterDawn()">Continuer</button>`);
}
function afterDawn(){
  const win=winner();if(win){showEpilogue(win);return;}
  startDayVote();
}
function startDayVote(){
  G.voteRound=1;G.voteCandidates=living().map(p=>p.id);startBallotRound();
}
function startBallotRound(){
  G.votes={};G.voterIndex=0;
  setContent(`<h2>⚖️ Conseil du village — Jour ${G.round}</h2><p>Débattez, accusez, défendez-vous.</p><p>Survivants : <b>${living().map(p=>p.name).join(", ")}</b></p><button onclick="nextVoter()">Lancer le vote secret</button>`);
}
function nextVoter(){
  const voters=living();
  if(G.voterIndex>=voters.length){tallyVotes();return;}
  const voter=voters[G.voterIndex];
  const candidates=G.voteCandidates.map(playerById).filter(p=>p.alive&&p.id!==voter.id);
  setContent(`<h2>🗳️ Vote secret</h2><p>Passe l'écran à <b>${voter.name}</b>.</p><button onclick="showVoteChoices()">Voir les choix</button>`);
}
function showVoteChoices(){
  const voter=living()[G.voterIndex];
  const candidates=G.voteCandidates.map(playerById).filter(p=>p.alive&&p.id!==voter.id);
  setContent(`<h2>🗳️ ${voter.name}, ton verdict</h2>${buttonList(candidates,"castVote")}`);
}
function castVote(id){
  G.votes[id]=(G.votes[id]||0)+1;G.voterIndex++;nextVoter();
}
function tallyVotes(){
  const entries=Object.entries(G.votes).map(([id,count])=>({id:Number(id),count}));
  const top=Math.max(...entries.map(e=>e.count));
  const tied=entries.filter(e=>e.count===top).map(e=>e.id);
  const lines=entries.sort((a,b)=>b.count-a.count).map(e=>`${playerById(e.id).name} : ${e.count} voix`).join("\n");
  if(tied.length===1){
    G.pendingDeaths=[{id:tied[0],cause:"condamné(e) par le village"}];G.deathLog=[];
    setContent(`<h2>⚖️ Dépouillement</h2><div class="log">${lines}</div><button onclick="executeCondemned()">Exécuter le verdict</button>`);
  }else if(G.voteRound<3){
    G.voteRound++;G.voteCandidates=tied;
    setContent(`<h2>⚖️ Égalité</h2><div class="log">${lines}</div><p>Nouveau vote entre : <b>${tied.map(id=>playerById(id).name).join(", ")}</b></p><button onclick="startBallotRound()">Nouveau vote</button>`);
  }else{
    setContent(`<h2>⚖️ Aucun verdict</h2><div class="log">${lines}</div><p>Après trois scrutins, personne n'est éliminé.</p><button onclick="startNight()">Passer à la nuit suivante</button>`);
  }
}
function executeCondemned(){
  processDeathQueue(()=>{
    const txt=G.deathLog.join("\n");
    setContent(`<h2>💀 Verdict exécuté</h2><div class="log">${txt}</div><button onclick="afterDayDeath()">Continuer</button>`);
  });
}
function afterDayDeath(){
  const win=winner();if(win){showEpilogue(win);return;}
  startNight();
}
function winner(){
  const a=living(),wolves=a.filter(p=>p.roleKey==="WOLF"),villagers=a.filter(p=>p.roleKey!=="WOLF");
  if(a.length===2&&a[0].loverId===a[1].id&&ROLES[a[0].roleKey].camp!==ROLES[a[1].roleKey].camp)
    return `♥ ${a[0].name} et ${a[1].name}, les Amoureux maudits, gagnent ensemble !`;
  if(!wolves.length)return "🕯️ LE VILLAGE A GAGNÉ — le dernier Loup-Garou a été démasqué.";
  if(wolves.length>=villagers.length)return "🐺 LA MEUTE A GAGNÉ — plus rien ne peut sauver Valombre.";
  return null;
}
function showEpilogue(result){
  const register=G.players.map(p=>{
    const love=p.loverId!==null?` — lié(e) à ${playerById(p.loverId).name}`:"";
    return `• ${p.name} : ${roleTitle(p)}, ${p.alive?"vivant(e)":"mort(e)"}${love}`;
  }).join("\n");
  setContent(`<h2>✦ Épilogue ✦</h2><p class="big">${result}</p><div class="log">${register}</div><button onclick="location.reload()">🔄 Nouvelle partie</button>`);
}
</script>
</body>
</html>
