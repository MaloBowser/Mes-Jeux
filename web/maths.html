<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Quiz de Maths</title>

<style>

body{
    background-image:url("../fond.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    text-align:center;
    color:white;
    font-family:Arial;
}

h1{
    font-size:60px;
    text-shadow:0 0 15px cyan;
}

#question{
    font-size:40px;
    margin:30px;
}

input{
    background:black;
    color:white;
    border:2px solid cyan;
    border-radius:15px;
    padding:10px;
    font-size:25px;
    text-align:center;
    width:150px;
}

button{
    background:black;
    color:white;
    border:2px solid cyan;
    border-radius:15px;
    padding:12px 25px;
    font-size:22px;
    margin:10px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 20px cyan;
}

#message{
    font-size:28px;
    margin-top:25px;
}

#score{
    font-size:25px;
    margin-top:20px;
}

</style>

</head>

<body>

<h1>🧮 Quiz de Maths 🧮</h1>

<p id="question"></p>

<input id="reponse" type="number" placeholder="Réponse">

<br><br>

<button onclick="verifier()">✅ Valider</button>

<button onclick="nouvelleQuestion()">🎲 Nouvelle question</button>

<p id="message"></p>

<p id="score">🏆 Score : 0</p>

<script>

const questions = [
    "5 + 3", "12 - 7", "9 + 8", "15 - 6", "7 × 6",
    "48 ÷ 6", "14 + 9", "20 - 13", "8 × 7", "81 ÷ 9",
    "16 + 15", "50 - 18", "9 × 9", "72 ÷ 8", "23 + 17",
    "40 - 25", "11 × 8", "64 ÷ 8", "19 + 24", "60 - 17",
    "13 × 4", "90 ÷ 10", "28 + 19", "75 - 28", "6 × 12",
    "54 ÷ 9", "33 + 18", "100 - 56", "7 × 11", "45 ÷ 5",
    "18 + 27", "84 - 39", "9 × 8", "63 ÷ 7", "25 + 26",
    "91 - 37", "12 × 6", "56 ÷ 7", "31 + 14", "70 - 29",
    "15 × 5", "96 ÷ 12", "22 + 35", "88 - 44", "4 × 13",
    "42 ÷ 6", "29 + 41", "73 - 18", "8 × 8", "36 ÷ 4",
    "17 + 18", "95 - 47", "14 × 3", "49 ÷ 7", "27 + 16",
    "82 - 35", "5 × 11", "90 ÷ 9", "38 + 12", "66 - 28",
    "6 × 9", "81 ÷ 3", "24 + 19", "77 - 39", "13 × 5",
    "56 ÷ 8", "15 + 28", "99 - 57", "12 × 7", "45 ÷ 9",
    "21 + 34", "80 - 22", "16 × 4", "72 ÷ 9", "39 + 13",
    "91 - 46", "8 × 12", "63 ÷ 9", "26 + 25", "58 - 19",
    "11 × 11", "48 ÷ 8", "18 + 36", "94 - 38", "7 × 9",
    "54 ÷ 6", "14 + 27", "85 - 49", "10 × 12", "96 ÷ 8",
    "32 + 29", "79 - 34", "9 × 7", "64 ÷ 4", "41 + 18",
    "100 - 27", "5 × 8", "84 ÷ 7", "37 + 22", "68 - 31"
]

const reponses = [
    8, 5, 17, 9, 42,
    8, 23, 7, 56, 9,
    31, 32, 81, 9, 40,
    15, 88, 8, 43, 43,
    52, 9, 47, 47, 72,
    6, 51, 44, 77, 9,
    45, 45, 72, 9, 51,
    54, 72, 8, 45, 41,
    75, 8, 57, 44, 52,
    7, 70, 55, 64, 9,
    35, 48, 42, 7, 43,
    47, 55, 10, 50, 38,
    54, 27, 43, 38, 65,
    7, 43, 42, 84, 5,
    55, 58, 64, 8, 52,
    45, 96, 7, 51, 39,
    121, 6, 54, 56, 63,
    9, 41, 36, 120, 12,
    61, 45, 63, 16, 59,
    73, 40, 12, 59, 37
]

let indice = 0;
let points = 0;

function nouvelleQuestion(){

    indice = Math.floor(Math.random()*questions.length);

    document.getElementById("question").innerHTML =
    questions[indice];

    document.getElementById("reponse").value = "";

    document.getElementById("message").innerHTML = "";

}

function verifier(){

    let rep = Number(document.getElementById("reponse").value);

    if(rep === reponses[indice]){

        points++;

        document.getElementById("message").innerHTML =
        "🎉 Bravo, tu es fort en maths !";

    }

    else{

        document.getElementById("message").innerHTML =
        "❌ La réponse était <b>"+reponses[indice]+"</b><br><br>C'était pourtant facile... 😅, c'est dans ton interêt de reviser !!!";

    }

    document.getElementById("score").innerHTML =
    "🏆 Score : " + points;

}

nouvelleQuestion();

</script>

</body>
</html>
